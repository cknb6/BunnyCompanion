name: Build Windows win-x64

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Offline fallback check
        shell: pwsh
        run: |
          dotnet run --project tools/OfflineFallbackCheck/OfflineFallbackCheck.csproj -c Release

      - name: Dotnet publish win-x64 single file
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $out = "publish-out"
          if (Test-Path $out) { Remove-Item $out -Recurse -Force }
          New-Item $out -ItemType Directory | Out-Null
          dotnet publish BunnyCompanion/BunnyCompanion.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o $out `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false
          if (-not (Test-Path "$out/BunnyCompanion.exe")) { throw "BunnyCompanion.exe missing" }
          $size = (Get-Item "$out/BunnyCompanion.exe").Length
          Write-Host "EXE size bytes: $size"
          if ($size -lt 30000000) { throw "EXE too small for self-contained WPF" }

      - name: Stage dist
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item dist -ItemType Directory -Force | Out-Null
          Copy-Item publish-out/BunnyCompanion.exe dist/BunnyCompanion-win-x64.exe
          Copy-Item publish-out/BunnyCompanion.exe dist/XiaoShenCompanion.exe
                    $hash = (Get-FileHash dist/BunnyCompanion-win-x64.exe -Algorithm SHA256).Hash
          $size = (Get-Item dist/BunnyCompanion-win-x64.exe).Length
          "SHA256=$hash" | Set-Content dist/artifact-info.txt
          "SIZE=$size" | Add-Content dist/artifact-info.txt
          Get-ChildItem dist | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BunnyCompanion-win-x64
          path: dist/*
          if-no-files-found: error
          retention-days: 14
