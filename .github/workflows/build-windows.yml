name: Build and Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # 两个架构各打一个自包含 EXE（Windows 无法把 x64+ARM 合成一个原生自包含包）
        rid: [win-x64, win-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Offline fallback check
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          dotnet run --project tools/OfflineFallbackCheck/OfflineFallbackCheck.csproj -c Release

      - name: Publish ${{ matrix.rid }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # 每个矩阵任务单独交付，避免互相覆盖校验文件
          Remove-Item "可直接发送" -Recurse -Force -ErrorAction SilentlyContinue
          & .\Build-Windows.ps1 -Runtime ${{ matrix.rid }} -Configuration Release
          Get-ChildItem "可直接发送" | Format-Table Name, Length

      - name: Upload per-arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rid }}
          path: 可直接发送/*
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all arch artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: List files
        run: |
          find artifacts -type f -exec ls -lh {} \;
          # 合并说明/校验（若有多份，保留任意一份说明即可）
          mkdir -p dist
          cp -f artifacts/BunnyCompanion-win-x64.exe dist/ 2>/dev/null || true
          cp -f artifacts/BunnyCompanion-win-arm64.exe dist/ 2>/dev/null || true
          # 中文名可能因编码在 runner 上显示异常，以英文名为准
          if [ -f artifacts/BunnyCompanion-win-x64.exe ]; then
            cp -f artifacts/BunnyCompanion-win-x64.exe dist/XiaoShenCompanion-x64.exe
          fi
          if [ -f artifacts/BunnyCompanion-win-arm64.exe ]; then
            cp -f artifacts/BunnyCompanion-win-arm64.exe dist/XiaoShenCompanion-arm64.exe
          fi
          # 复制中文文件名（若存在）
          find artifacts -name '*.exe' -o -name '*.txt' | while read f; do
            base=$(basename "$f")
            case "$base" in
              BunnyCompanion-win-x64.exe|BunnyCompanion-win-arm64.exe) ;;
              *) cp -f "$f" "dist/$base" 2>/dev/null || true ;;
            esac
          done
          ls -lh dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.${{ github.run_number }}
          name: 小申陪伴 v1.1.${{ github.run_number }}
          body: |
            ## 下载说明（请按电脑 CPU 选择）

            | 文件 | 适用电脑 |
            |------|----------|
            | **BunnyCompanion-win-x64.exe**（或 小申陪伴-x64.exe） | 绝大多数 Intel / AMD Windows（含多数 Windows on ARM 的 x64 兼容） |
            | **BunnyCompanion-win-arm64.exe**（或 小申陪伴-arm64.exe） | 原生 ARM64 Windows（如部分 Surface / Snapdragon 本） |

            - **自包含**，约 70～100MB，**无需安装 .NET**
            - **不要**下多个名字相同架构的重复文件；每个架构只需一个 EXE
            - SmartScreen 若拦截：更多信息 → 仍要运行

            ### 为何不能只有一个「通用 EXE」？
            Windows 自包含 .NET 程序按 CPU 架构分别打包（x64 / ARM64），无法像部分安装包那样合成单一原生二进制。  
            若只下一个文件：优先 **x64**（兼容面最广）。

            提交：`${{ github.sha }}`
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
