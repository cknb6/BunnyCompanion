name: Build and Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # 两个架构各打一个自包含 EXE（Windows 无法把 x64+ARM 合成一个原生自包含包）
        rid: [win-x64, win-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Offline fallback check
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          dotnet run --project tools/OfflineFallbackCheck/OfflineFallbackCheck.csproj -c Release

      - name: Publish ${{ matrix.rid }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Remove-Item "可直接发送" -Recurse -Force -ErrorAction SilentlyContinue
          & .\Build-Windows.ps1 -Runtime ${{ matrix.rid }} -Configuration Release
          Get-ChildItem "可直接发送" | Format-Table Name, Length

      - name: Upload per-arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rid }}
          path: 可直接发送/*
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # gh release create 需要 .git（否则 tag/target 会报 not a git repository）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all arch artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      # 仅准备 ASCII 文件名，避免 softprops/gh 对中文资源名做 label 更新时 404
      - name: Prepare release assets (ASCII names only)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f -exec ls -lh {} \;

          # 主产物：固定英文名（必选）
          x64="$(find artifacts -name 'BunnyCompanion-win-x64.exe' -type f | head -n1)"
          arm64="$(find artifacts -name 'BunnyCompanion-win-arm64.exe' -type f | head -n1)"
          if [[ -z "${x64}" || -z "${arm64}" ]]; then
            echo "Missing required EXEs"
            find artifacts -type f
            exit 1
          fi
          cp -f "$x64" dist/BunnyCompanion-win-x64.exe
          cp -f "$arm64" dist/BunnyCompanion-win-arm64.exe

          # 说明 / 校验：转成英文名，避免中文文件名触发 release asset label API 问题
          readme="$(find artifacts -name '使用说明.txt' -type f | head -n1 || true)"
          if [[ -n "${readme}" ]]; then
            cp -f "$readme" dist/README-zh.txt
          fi
          checksum="$(find artifacts -name '版本校验.txt' -type f | head -n1 || true)"
          if [[ -n "${checksum}" ]]; then
            cp -f "$checksum" dist/checksums.txt
          fi

          ls -lh dist
          # 仅允许 ASCII 文件名（防止再次踩 release asset label 404）
          for f in dist/*; do
            base="$(basename "$f")"
            if [[ ! "$base" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "Non-ASCII or unsafe filename in dist: $base"
              exit 1
            fi
          done

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ## 下载说明（请按电脑 CPU 选择）

          | 文件 | 适用电脑 |
          |------|----------|
          | **BunnyCompanion-win-x64.exe** | 绝大多数 Intel / AMD Windows（含多数 Windows on ARM 的 x64 兼容） |
          | **BunnyCompanion-win-arm64.exe** | 原生 ARM64 Windows（如部分 Surface / Snapdragon 本） |
          | README-zh.txt | 中文使用说明 |
          | checksums.txt | 校验信息（若有） |

          - **自包含**，约 70～100MB，**无需安装 .NET**
          - 每个架构只需下载 **一个** EXE
          - SmartScreen 若拦截：更多信息 → 仍要运行

          ### 为何不能只有一个「通用 EXE」？
          Windows 自包含 .NET 程序按 CPU 架构分别打包（x64 / ARM64），无法合成单一原生二进制。  
          不确定时优先 **x64**。

          ### 开发者
          **本软件由传康KK开发。**  
          打包账号：cknb6（Actions）；开发者大号：1837620622。

          提交：\`${{ github.sha }}\`
          Run：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      # 不用 softprops：中文名 + overwrite 会调 update-a-release-asset 导致 Not Found
      - name: Create GitHub Release (gh CLI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # 主版本从 csproj 的 <Version> 读取（单一来源），补丁号用 run_number 区分每次构建
          APP_VERSION="$(grep -oP '(?<=<Version>)[^<]+' BunnyCompanion/BunnyCompanion.csproj || true)"
          APP_VERSION="${APP_VERSION:-0.0.0}"
          TAG="v${APP_VERSION}.${{ github.run_number }}"
          TITLE="小申陪伴 ${TAG}"
          TARGET="${{ github.sha }}"

          # 若同 tag 已存在（workflow 重跑），先删再发
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — deleting for clean recreate"
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes || true
          fi
          # 删除残留 tag（若有）
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true

          ASSETS=(dist/BunnyCompanion-win-x64.exe dist/BunnyCompanion-win-arm64.exe)
          [[ -f dist/README-zh.txt ]] && ASSETS+=(dist/README-zh.txt)
          [[ -f dist/checksums.txt ]] && ASSETS+=(dist/checksums.txt)

          for a in "${ASSETS[@]}"; do
            [[ -f "$a" ]] || { echo "missing $a"; exit 1; }
          done

          gh release create "$TAG" "${ASSETS[@]}" \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --notes-file release-notes.md \
            --target "$TARGET" \
            --latest

          echo "Release created:"
          gh release view "$TAG" --repo "${{ github.repository }}" \
            --json url,tagName,assets --jq '{url,tagName,assets:[.assets[].name]}'
