name: Build Windows win-x64

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Offline fallback check
        shell: pwsh
        run: dotnet run --project tools/OfflineFallbackCheck/OfflineFallbackCheck.csproj -c Release

      - name: Publish self-contained single-file
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          & .\Build-Windows.ps1 -Runtime win-x64 -Configuration Release

      - name: Stage English-named artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $srcDir = Join-Path $env:GITHUB_WORKSPACE ([char]0x53EF + [char]0x76F4 + [char]0x63A5 + [char]0x53D1 + [char]0x9001)
          # Prefer literal Chinese folder name via .NET
          $delivery = Get-ChildItem -LiteralPath $env:GITHUB_WORKSPACE -Directory |
            Where-Object { $_.Name -eq "可直接发送" } |
            Select-Object -First 1
          if (-not $delivery) { throw "delivery folder missing" }
          $exe = Get-ChildItem -LiteralPath $delivery.FullName -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "exe missing in delivery folder" }
          $stage = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item $stage -ItemType Directory -Force | Out-Null
          Copy-Item -LiteralPath $exe.FullName (Join-Path $stage "BunnyCompanion-win-x64.exe")
          Copy-Item -LiteralPath $exe.FullName (Join-Path $stage "XiaoShenCompanion.exe")
          Get-ChildItem -LiteralPath $delivery.FullName -Filter "*.txt" | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName (Join-Path $stage $_.Name)
          }
          $hash = (Get-FileHash -LiteralPath (Join-Path $stage "BunnyCompanion-win-x64.exe") -Algorithm SHA256).Hash
          $size = (Get-Item -LiteralPath (Join-Path $stage "BunnyCompanion-win-x64.exe")).Length
          "SHA256=$hash" | Set-Content (Join-Path $stage "artifact-info.txt")
          "SIZE=$size" | Add-Content (Join-Path $stage "artifact-info.txt")
          if ($size -lt 30MB) { throw "exe too small: $size" }
          Get-ChildItem $stage | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BunnyCompanion-win-x64
          path: dist/*
          if-no-files-found: error
          retention-days: 14
